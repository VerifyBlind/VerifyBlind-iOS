workflows:

  # ── DEV branch → TestFlight Internal ───────────────────────────────────────
  ios-dev:
    name: iOS Dev → TestFlight Internal
    max_build_duration: 60
    environment:
      groups:
        - verifyblind_ios_dev
      vars:
        XCODE_SCHEME: VerifyBlind
        XCODE_PROJECT: VerifyBlind.xcodeproj
        BUNDLE_ID: app.verifyblind.ios
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: dev
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate xcconfig from env vars
        script: |
          {
            echo "API_BASE_URL = https:/\$()/api.verifyblind.com/api/verify/"
            echo "CERT_PIN_1 = ${CERT_PIN_1:-}"
            echo "CERT_PIN_2 = ${CERT_PIN_2:-}"
            echo "ENCLAVE_DEVELOPER_PUBLIC_KEY = ${ENCLAVE_DEVELOPER_PUBLIC_KEY:-}"
            echo "APPLE_TEAM_ID = ${APPLE_TEAM_ID}"
            echo "IOS_BUNDLE_ID = ${BUNDLE_ID}"
            echo "APP_ATTEST_ENVIRONMENT = development"
            echo "ICLOUD_CONTAINER_ID = iCloud.${BUNDLE_ID}"
            echo "SENTRY_DSN = ${SENTRY_DSN:-}"
            echo "DROPBOX_IOS_APP_KEY = ${DROPBOX_IOS_APP_KEY:-}"
            echo "BUILD_NUMBER = $BUILD_NUMBER"
          } > Config/Debug.xcconfig

      - name: Generate Xcode project (XcodeGen)
        script: xcodegen generate

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch Distribution certificate + App Store provisioning profile
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create

      - name: Add certificate to keychain
        script: keychain add-certificates

      - name: Set Xcode project to use fetched profiles
        script: xcode-project use-profiles

      - name: Build and export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            -- \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        expire_build_submitted_for_review: true

  # ── MAIN branch → TestFlight External (hazır olmadıkça kullanma) ───────────
  ios-prod:
    name: iOS Prod → TestFlight External
    max_build_duration: 60
    environment:
      groups:
        - verifyblind_ios_prod
      vars:
        XCODE_SCHEME: VerifyBlind
        XCODE_PROJECT: VerifyBlind.xcodeproj
        BUNDLE_ID: app.verifyblind.ios
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate xcconfig from env vars
        script: |
          {
            echo "API_BASE_URL = https:/\$()/api.verifyblind.com/api/verify/"
            echo "CERT_PIN_1 = ${CERT_PIN_1:-}"
            echo "CERT_PIN_2 = ${CERT_PIN_2:-}"
            echo "ENCLAVE_DEVELOPER_PUBLIC_KEY = ${ENCLAVE_DEVELOPER_PUBLIC_KEY:-}"
            echo "APPLE_TEAM_ID = ${APPLE_TEAM_ID}"
            echo "IOS_BUNDLE_ID = ${BUNDLE_ID}"
            echo "APP_ATTEST_ENVIRONMENT = production"
            echo "ICLOUD_CONTAINER_ID = iCloud.${BUNDLE_ID}"
            echo "SENTRY_DSN = ${SENTRY_DSN:-}"
            echo "DROPBOX_IOS_APP_KEY = ${DROPBOX_IOS_APP_KEY:-}"
            echo "BUILD_NUMBER = $BUILD_NUMBER"
          } > Config/Release.xcconfig

      - name: Generate Xcode project (XcodeGen)
        script: xcodegen generate

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch Distribution certificate + App Store provisioning profile
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create

      - name: Add certificate to keychain
        script: keychain add-certificates

      - name: Set Xcode project to use fetched profiles
        script: xcode-project use-profiles

      - name: Build and export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            -- \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - External Testers
        expire_build_submitted_for_review: true

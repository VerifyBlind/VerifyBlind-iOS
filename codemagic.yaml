workflows:

  # ── DEV branch → TestFlight Internal ───────────────────────────────────────
  ios-dev:
    name: iOS Dev → TestFlight Internal
    max_build_duration: 60
    cache:
      cache_paths:
        - $HOME/Library/Caches/org.swift.swiftpm
        - $HOME/Library/Developer/Xcode/DerivedData
    environment:
      groups:
        - verifyblind_ios_dev
      vars:
        XCODE_SCHEME: VerifyBlind
        XCODE_PROJECT: VerifyBlind.xcodeproj
        BUNDLE_ID: app.verifyblind.ios
    # Tetik = `tflight` deploy branch'i (DOĞRUDAN dev DEĞİL). Akış: dev'e push →
    # ücretsiz GitHub Actions preflight (derleme+resolve) → YEŞİL + commit'te [build] →
    # GH Actions dev'i `tflight`'a push eder → bu push webhook ile burayı tetikler.
    # Böylece Codemagic yalnızca DERLENEN kodda çalışır; 500 dk imza+TestFlight'a gider.
    # Manuel alternatif: Codemagic UI → Start new build (branch tflight veya dev).
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: tflight
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Resolve next build number from TestFlight
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" 2>/dev/null || echo 0)
          NEW_BUILD=$(( ${LATEST:-0} + 1 ))
          echo "BUILD_NUMBER=$NEW_BUILD" >> $CM_ENV
          echo "TestFlight latest=${LATEST:-0} → new build number=$NEW_BUILD"

      - name: Generate xcconfig from env vars
        script: |
          # xcconfig'te '//' yorum karakteri → URL/DSN'lerdeki '//' kırpılır.
          # '//' → '/$()/' kaçışı uygula ($() build sırasında boş expand olur).
          DSN_ESC=$(printf '%s' "${SENTRY_DSN:-}" | sed 's|//|/$()/|g')
          {
            echo "API_BASE_URL = https:/\$()/api.verifyblind.com/api/verify/"
            echo "CERT_PIN_1 = ${CERT_PIN_1:-}"
            echo "CERT_PIN_2 = ${CERT_PIN_2:-}"
            echo "ENCLAVE_DEVELOPER_PUBLIC_KEY = ${ENCLAVE_DEVELOPER_PUBLIC_KEY:-}"
            echo "APPLE_TEAM_ID = ${APPLE_TEAM_ID}"
            echo "IOS_BUNDLE_ID = ${BUNDLE_ID}"
            echo "APP_ATTEST_ENVIRONMENT = development"
            echo "ICLOUD_CONTAINER_ID = iCloud.${BUNDLE_ID}"
            echo "SENTRY_DSN = $DSN_ESC"
            echo "DROPBOX_IOS_APP_KEY = ${DROPBOX_IOS_APP_KEY:-}"
            echo "BUILD_NUMBER = $BUILD_NUMBER"
          # Build --config Release ile alınıyor → Release.xcconfig okunur.
          # Dev workflow'da da Release.xcconfig'e yazıyoruz ama development değerleriyle.
          } | tee Config/Debug.xcconfig > Config/Release.xcconfig

      - name: Generate Xcode project (XcodeGen)
        script: xcodegen generate

      # Commit'lenmiş Package.resolved → sürüm kilidi (preflight'ın doğruladığı sürümler).
      - name: Place locked Package.resolved
        script: |
          DEST="$XCODE_PROJECT/project.xcworkspace/xcshareddata/swiftpm"
          mkdir -p "$DEST"
          cp Package.resolved "$DEST/Package.resolved"

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch Distribution certificate + App Store provisioning profile
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create

      - name: Add certificate to keychain
        script: keychain add-certificates

      - name: Set Xcode project to use fetched profiles
        script: xcode-project use-profiles

      - name: Build and export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release

      # dSYM'leri Sentry'e yükle → crash trace'leri sembolize olur (fonksiyon adı + satır).
      # Debug ID (UUID) ile eşleşir, release'ten bağımsız. Token/org/project eksikse atlar
      # (henüz Codemagic env group'a eklenmemişse build kırılmasın). --include-sources:
      # build anındaki kaynağı dSYM'e gömer → Sentry stack trace'inde satırın etrafındaki kod
      # inline görünür ve tam build commit'iyle eşleşir (repo public, gizlilik kaygısı yok).
      - name: Upload dSYMs to Sentry
        script: |
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ] || [ -z "${SENTRY_ORG:-}" ] || [ -z "${SENTRY_PROJECT:-}" ]; then
            echo "⚠️  SENTRY_AUTH_TOKEN/SENTRY_ORG/SENTRY_PROJECT eksik — dSYM upload atlandı."
            exit 0
          fi
          command -v sentry-cli >/dev/null 2>&1 || curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli debug-files upload \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --include-sources \
            build/ios \
            "$HOME/Library/Developer/Xcode/DerivedData"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        # beta_groups YOK: internal testçiler işlenen her build'i OTOMATİK alır; ASC API
        # internal gruba build atamayı reddeder ("Cannot add internal group to a build").
        # beta_groups yalnızca EXTERNAL gruplar için (bkz. ios-prod).
        expire_build_submitted_for_review: true

  # ── MAIN branch → TestFlight External (hazır olmadıkça kullanma) ───────────

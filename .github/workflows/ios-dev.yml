name: iOS Dev → TestFlight Internal

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ios-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    name: Build + Sign + TestFlight Internal
    runs-on: macos-26
    timeout-minutes: 60
    environment: development
    env:
      BUNDLE_ID: app.verifyblind.ios
      APP_ATTEST_ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4

      - name: SPM cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install tools
        run: |
          brew install xcodegen
          pip3 install --break-system-packages codemagic-cli-tools

      - name: Build, sign, upload
        env:
          APP_STORE_APP_ID: ${{ secrets.APP_STORE_APP_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERT_PIN_1: ${{ secrets.CERT_PIN_1 }}
          CERT_PIN_2: ${{ secrets.CERT_PIN_2 }}
          ENCLAVE_DEVELOPER_PUBLIC_KEY: ${{ secrets.ENCLAVE_DEVELOPER_PUBLIC_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          DROPBOX_IOS_APP_KEY: ${{ secrets.DROPBOX_IOS_APP_KEY }}
          GOOGLE_IOS_CLIENT_ID: ${{ secrets.GOOGLE_IOS_CLIENT_ID }}
          GOOGLE_IOS_REVERSED_CLIENT_ID: ${{ secrets.GOOGLE_IOS_REVERSED_CLIENT_ID }}
        run: bash scripts/ci/ios-build-upload.sh

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-dev-${{ github.run_number }}
          path: build/ios/ipa/*.ipa
          if-no-files-found: warn

      # SPM çözümü sonrası kesin Package.resolved'ı (GoogleSignIn + transitive dahil) yakala.
      # Reproducibility: indirip src/VerifyBlind.iOS/Package.resolved'a koy + commit et.
      - name: Upload resolved Package.resolved
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-resolved-${{ github.run_number }}
          path: VerifyBlind.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
          if-no-files-found: warn

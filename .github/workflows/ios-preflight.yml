name: iOS Preflight (resolve + unsigned build)

# Ücretsiz GitHub Actions macOS runner'da derleme ön-kontrolü.
# Amaç: SPM resolution VE Swift compile hatalarını Codemagic dakikası harcamadan yakalamak
# (Windows'ta iOS derlenemiyor). İmza/TestFlight YOK — sadece "derleniyor mu?" kontrolü.
# Yeşil olunca Codemagic ios-dev build'i MANUEL başlatılır (TestFlight için).

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ios-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Xcode sürümü
        run: xcodebuild -version

      - name: XcodeGen kur
        run: brew install xcodegen

      - name: Xcode projesi üret
        run: xcodegen generate

      # Commit'lenmiş Package.resolved'ı üretilen .xcodeproj'a yerleştir → sürüm kilidi.
      # (.xcodeproj gitignore'da/regenerate edildiği için her build'de kopyalanır.)
      - name: Kilitli Package.resolved'ı yerleştir
        run: |
          DEST="VerifyBlind.xcodeproj/project.xcworkspace/xcshareddata/swiftpm"
          mkdir -p "$DEST"
          cp Package.resolved "$DEST/Package.resolved"

      - name: SPM bağımlılıklarını çöz
        run: |
          set -o pipefail
          xcodebuild -resolvePackageDependencies \
            -project VerifyBlind.xcodeproj \
            -scheme VerifyBlind

      - name: Derle (imzasız, iOS cihaz SDK — CoreNFC simülatörde yok)
        run: |
          set -o pipefail
          xcodebuild build \
            -project VerifyBlind.xcodeproj \
            -scheme VerifyBlind \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      # Yeşil build'in ürettiği Package.resolved'ı sakla → indirip commit'leyerek
      # gerçek sürüm kilidi sağlanabilir (idiomatic SPM reproducibility).
      - name: Package.resolved'ı artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Package.resolved
          path: VerifyBlind.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
          if-no-files-found: warn

  # Preflight (derleme) YEŞİL + commit mesajında [build] varsa → Codemagic ios-dev'i
  # otomatik başlat. Ucuz ubuntu runner (macOS dakikası HARCAMAZ). Codemagic yalnızca
  # derlenen kodda çalışır → kırık build dakika yemez.
  # NOT: "az build al" için [build] kapısı var. HER yeşil push'ta build istersen
  # aşağıdaki if'ten `&& contains(...)` kısmını sil. Gerekli secret: CODEMAGIC_API_TOKEN.
  trigger-codemagic:
    needs: build
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[build]')
    runs-on: ubuntu-latest
    steps:
      - name: Codemagic ios-dev build başlat (Builds API)
        env:
          CM_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
        run: |
          if [ -z "$CM_TOKEN" ]; then
            echo "::warning::CODEMAGIC_API_TOKEN secret yok — Codemagic tetiklenmedi. Repo Settings → Secrets and variables → Actions'a ekle."
            exit 0
          fi
          HTTP=$(curl -sS -o /tmp/cm.json -w '%{http_code}' -X POST https://api.codemagic.io/builds \
            -H "Content-Type: application/json" \
            -H "x-auth-token: $CM_TOKEN" \
            --data '{"appId":"6a21d66e3f9f7d15b88b9baa","workflowId":"ios-dev","branch":"dev"}')
          echo "Codemagic API HTTP $HTTP"
          cat /tmp/cm.json 2>/dev/null || true
          echo
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
            echo "::error::Codemagic build başlatılamadı (HTTP $HTTP)"
            exit 1
          fi
          echo "✓ Codemagic ios-dev build başlatıldı (branch: dev)."

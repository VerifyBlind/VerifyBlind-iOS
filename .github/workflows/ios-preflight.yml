name: iOS Preflight (resolve + unsigned build)

# Ücretsiz GitHub Actions macOS runner'da derleme ön-kontrolü.
# Amaç: SPM resolution VE Swift compile hatalarını Codemagic dakikası harcamadan yakalamak
# (Windows'ta iOS derlenemiyor). İmza/TestFlight YOK — sadece "derleniyor mu?" kontrolü.
# Yeşil olunca Codemagic ios-dev build'i MANUEL başlatılır (TestFlight için).

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ios-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Xcode sürümü
        run: xcodebuild -version

      - name: XcodeGen kur
        run: brew install xcodegen

      - name: Xcode projesi üret
        run: xcodegen generate

      # Commit'lenmiş Package.resolved'ı üretilen .xcodeproj'a yerleştir → sürüm kilidi.
      # (.xcodeproj gitignore'da/regenerate edildiği için her build'de kopyalanır.)
      - name: Kilitli Package.resolved'ı yerleştir
        run: |
          DEST="VerifyBlind.xcodeproj/project.xcworkspace/xcshareddata/swiftpm"
          mkdir -p "$DEST"
          cp Package.resolved "$DEST/Package.resolved"

      - name: SPM bağımlılıklarını çöz
        run: |
          set -o pipefail
          xcodebuild -resolvePackageDependencies \
            -project VerifyBlind.xcodeproj \
            -scheme VerifyBlind

      - name: Derle (imzasız, iOS cihaz SDK — CoreNFC simülatörde yok)
        run: |
          set -o pipefail
          xcodebuild build \
            -project VerifyBlind.xcodeproj \
            -scheme VerifyBlind \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      # Yeşil build'in ürettiği Package.resolved'ı sakla → indirip commit'leyerek
      # gerçek sürüm kilidi sağlanabilir (idiomatic SPM reproducibility).
      - name: Package.resolved'ı artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Package.resolved
          path: VerifyBlind.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
          if-no-files-found: warn

  # Preflight (derleme) YEŞİL + commit mesajında [build] varsa → dev'i `tflight` deploy
  # branch'ine promote et. Bu GERÇEK push, GitHub→Codemagic webhook'unu tetikler; Codemagic
  # ios-dev `tflight`'ta build alır. API TOKEN GEREKMEZ (ücretsiz planda token yok) — sadece
  # git push + mevcut webhook. Ucuz ubuntu runner (macOS dakikası harcamaz).
  # "Az build al" için [build] kapısı; her yeşilde build istersen `&& contains(...)`'i sil.
  promote-to-codemagic:
    needs: build
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[build]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: dev → tflight promote (Codemagic webhook'unu tetikler)
        run: |
          git push origin HEAD:refs/heads/tflight --force
          echo "✓ tflight güncellendi → Codemagic ios-dev build'i webhook ile başlayacak."
